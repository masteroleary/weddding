<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C &amp; M — Photo Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Great+Vibes&family=Special+Elite&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --cream:#F5F0E8;
    --parchment:#EDE5D4;
    --gold:#C4A97A;
    --gold-dark:#9A7B4F;
    --gold-deep:#8B6914;
    --brown-light:#A4966B;
    --brown:#6B4A22;
    --brown-dark:#3D2B1A;
    --espresso:#2B1A0F;
    --text-body:#5C4A32;
    --text-muted:#7A6040;
    --border:rgba(139,105,20,0.28);
    --card-bg:rgba(255,250,242,0.88);
    --leather:#8B5E3C;
    --leather-dark:#5C3D1E;
    --leather-light:#C4956A;
    --gold-light:#E8C97A;
    --aged:#B8A88A;
  }

  html{scroll-behavior:smooth}

  body{
    font-family:'Cormorant Garamond',Georgia,serif;
    background-color:var(--cream);
    color:var(--espresso);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }

  /* ── Nav ── */
  .site{
    position:relative;
    z-index:1;
    max-width:1100px;
    margin:0 auto;
    min-height:100vh;
  }

  .nav{
    display:flex;flex-wrap:wrap;gap:2px;justify-content:center;
    padding:1.25rem 1rem 0;
    position:sticky;top:0;
    background:rgba(245,240,232,0.95);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    z-index:100;
    border-bottom:1px solid rgba(196,169,122,0.4);
    width:95vw;
    margin-left:50%;
    transform:translateX(-50%);
  }
  .nav::before{
    content:'';
    display:block;
    position:absolute;
    top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:0.6;
  }
  .nav button{
    background:transparent;border:none;
    font-size:14px;font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:600;
    color:var(--text-muted);cursor:pointer;
    padding:9px 16px 11px;
    border-radius:3px;
    transition:all .18s;
    letter-spacing:.12em;
    text-transform:uppercase;
    position:relative;
  }
  .nav button::after{
    content:'';position:absolute;bottom:0;left:50%;right:50%;
    height:2px;background:var(--gold);
    transition:left .2s,right .2s;
  }
  .nav button:hover{color:var(--espresso)}
  .nav button.active{color:var(--espresso)}
  .nav button.active::after{left:12px;right:12px}

  /* ── Page header ── */
  .content{padding:2rem 1.5rem 3rem;animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .page-header{text-align:center;margin-bottom:1.75rem}
  .page-header p{
    font-size:36px;font-weight:300;font-style:italic;
    font-family:'Cormorant Garamond',Georgia,serif;
    color:var(--espresso);letter-spacing:.08em;
  }
  .page-header .subtitle{
    font-size:13px;color:var(--text-muted);letter-spacing:.15em;
    text-transform:uppercase;margin-top:.35rem;
  }

  /* ── Book scene ── */
  .book-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:2rem;
  }

  .scene{
    position:relative;
    width:min(520px, 90vw);
    height:min(400px, 68vw);
    perspective:1800px;
    margin:0 auto;
  }

  .book-shadow{
    position:absolute;
    bottom:-22px;left:4%;right:2%;height:28px;
    background:radial-gradient(ellipse,rgba(0,0,0,0.42) 0%,transparent 70%);
    filter:blur(12px);
  }

  .book{
    position:relative;
    width:100%;height:100%;
    transform-style:preserve-3d;
  }

  /* Back cover / visible book body */
  .book-cover-bg{
    position:absolute;inset:0;
    border-radius:4px 10px 10px 4px;
    background:
      radial-gradient(ellipse at 30% 20%,rgba(255,220,170,0.10),transparent 50%),
      radial-gradient(ellipse at 70% 80%,rgba(0,0,0,0.18),transparent 55%),
      linear-gradient(135deg,#4a2e18 0%,var(--leather-dark) 30%,var(--leather) 55%,var(--leather-light) 72%,var(--leather) 100%);
    box-shadow:-10px 6px 28px rgba(0,0,0,0.55),inset 2px 0 6px rgba(255,220,170,0.08),inset -3px 0 10px rgba(0,0,0,0.3);
  }
  .book-cover-bg::before{
    content:'';position:absolute;inset:0;border-radius:inherit;
    background:
      repeating-linear-gradient(42deg,transparent 0,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px),
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 3px);
    opacity:0.9;
  }
  .book-cover-bg::after{
    content:'';position:absolute;inset:10px;
    border:1px double rgba(212,178,94,0.45);
    border-radius:2px 8px 8px 2px;pointer-events:none;
  }

  .book-spine{
    position:absolute;left:0;top:0;width:28px;height:100%;
    background:linear-gradient(90deg,#3a2008 0%,var(--leather-dark) 25%,#5a3010 55%,var(--leather-dark) 80%,#2d1906 100%);
    border-radius:4px 0 0 4px;
    box-shadow:inset -4px 0 10px rgba(0,0,0,0.5),inset 2px 0 4px rgba(255,220,170,0.06);
    z-index:5;
  }
  /* Raised leather bands on the spine */
  .book-spine::before{
    content:'';position:absolute;left:3px;right:3px;
    top:14%;height:10%;
    background:linear-gradient(180deg,rgba(255,220,170,0.12),rgba(0,0,0,0.25));
    box-shadow:0 1px 0 rgba(255,220,170,0.08),0 -1px 0 rgba(0,0,0,0.35);
    border-radius:2px;
  }
  .book-spine::after{
    content:'';position:absolute;left:3px;right:3px;
    bottom:14%;height:10%;
    background:linear-gradient(180deg,rgba(255,220,170,0.12),rgba(0,0,0,0.25));
    box-shadow:0 1px 0 rgba(255,220,170,0.08),0 -1px 0 rgba(0,0,0,0.35);
    border-radius:2px;
  }
  .spine-title{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(-90deg);
    font-family:'Cinzel',serif;
    font-size:9px;letter-spacing:5px;color:rgba(212,178,94,0.55);
    white-space:nowrap;z-index:2;
    text-shadow:0 1px 0 rgba(0,0,0,0.6);
  }

  .pages-stack{
    position:absolute;left:28px;top:3px;right:3px;bottom:3px;
    background:linear-gradient(90deg,var(--parchment),var(--cream));
    border-radius:0 8px 8px 0;
    display:none;
  }

  /* ── Front cover ── */
  .cover-page{
    position:absolute;left:28px;top:0;right:0;bottom:0;
    background:
      radial-gradient(ellipse at 30% 20%,rgba(255,220,170,0.12),transparent 55%),
      radial-gradient(ellipse at 80% 90%,rgba(0,0,0,0.20),transparent 60%),
      linear-gradient(135deg,#4a2e18 0%,var(--leather-dark) 30%,var(--leather) 55%,var(--leather-light) 75%,var(--leather) 100%);
    border-radius:0 10px 10px 0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    cursor:pointer;z-index:50;
    transition:transform 2s cubic-bezier(0.645,0.045,0.355,1.000);
    transform-origin:left center;
    transform-style:preserve-3d;
    backface-visibility:hidden;
  }
  .cover-page::before{
    content:'';position:absolute;inset:0;border-radius:inherit;
    background:
      repeating-linear-gradient(42deg,transparent 0,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px),
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.045) 2px,rgba(0,0,0,0.045) 3px);
    opacity:0.9;
  }
  .cover-page.open{transform:rotateY(-180deg);}

  /* Double-rule gilded border */
  .cover-border{
    position:absolute;inset:14px;
    border:1px solid rgba(212,178,94,0.55);
    border-radius:3px;pointer-events:none;
  }
  .cover-border::before{
    content:'';position:absolute;inset:5px;
    border:0.5px solid rgba(212,178,94,0.35);
    border-radius:2px;
  }
  /* Decorative corner flourishes */
  .cover-border::after{
    content:'';position:absolute;inset:-1px;pointer-events:none;
    background:
      radial-gradient(circle at 0 0,rgba(212,178,94,0.55) 1.5px,transparent 2px),
      radial-gradient(circle at 100% 0,rgba(212,178,94,0.55) 1.5px,transparent 2px),
      radial-gradient(circle at 0 100%,rgba(212,178,94,0.55) 1.5px,transparent 2px),
      radial-gradient(circle at 100% 100%,rgba(212,178,94,0.55) 1.5px,transparent 2px);
  }

  .cover-icon{font-size:28px;position:relative;z-index:1;opacity:0.65;line-height:1;color:rgba(212,178,94,0.7);}
  .cover-rule{
    width:120px;height:1px;position:relative;z-index:1;
    background:linear-gradient(90deg,transparent,rgba(212,178,94,0.7),transparent);
  }
  .cover-rule::before,.cover-rule::after{
    content:'';position:absolute;top:50%;width:5px;height:5px;
    background:rgba(212,178,94,0.7);transform:translateY(-50%) rotate(45deg);
  }
  .cover-rule::before{left:-6px;}
  .cover-rule::after{right:-6px;}

  .cover-title{
    font-family:'Great Vibes',cursive;
    font-size:58px;font-weight:400;color:#e8c97a;
    letter-spacing:1px;text-align:center;line-height:1;
    position:relative;z-index:1;
    text-shadow:0 2px 10px rgba(0,0,0,0.5),0 0 20px rgba(232,201,122,0.15);
  }
  .cover-subtitle{
    font-family:'Cinzel',serif;
    font-size:10px;letter-spacing:6px;color:rgba(212,178,94,0.65);
    text-transform:uppercase;position:relative;z-index:1;
    font-weight:500;
  }
  .cover-hint{
    position:absolute;bottom:20px;
    font-family:'Cormorant Garamond',serif;
    font-size:10px;font-style:italic;letter-spacing:3px;color:rgba(212,178,94,0.4);
    z-index:1;animation:blink 2.4s infinite;
  }
  @keyframes blink{0%,100%{opacity:0.35}50%{opacity:0.9}}

  /* ── Page container ── */
  .page-container{
    position:absolute;left:28px;top:0;right:0;bottom:0;
    transform-style:preserve-3d;
  }

  /* ── Individual page (leaf) ── */
  .leaf{
    position:absolute;inset:0;
    transform-style:preserve-3d;
    transform-origin:left center;
    transition:transform 2s cubic-bezier(0.645,0.045,0.355,1.000);
    cursor:pointer;
  }
  .leaf.flipped{transform:rotateY(-180deg);}

  .leaf-front,.leaf-back{
    position:absolute;inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
  }
  .leaf-front{
    border-radius:0 10px 10px 0;
    background:var(--cream);
    box-shadow:
      inset -4px 0 14px rgba(0,0,0,0.08),
      inset -1px 0 0 rgba(201,168,76,0.35);
  }
  /* Subtle gilded page edge */
  .leaf-front::after{
    content:'';position:absolute;top:2px;bottom:2px;right:0;width:2px;
    background:linear-gradient(90deg,rgba(212,178,94,0.15),rgba(212,178,94,0.45));
    pointer-events:none;border-radius:0 2px 2px 0;
  }
  .leaf-back{
    transform:rotateY(180deg);
    border-radius:10px 0 0 10px;
    background:transparent;
    box-shadow:none;
    visibility:hidden;
  }

  /* ── Photo page interior ── */
  .page-inner{
    padding:22px 26px 20px 30px;
    height:100%;display:flex;flex-direction:column;
    position:relative;
    background:
      radial-gradient(ellipse at 50% 50%,var(--cream) 0%,#EFE7D4 100%);
  }
  .leaf-back .page-inner{padding:22px 30px 20px 26px;}

  .page-inner::before{
    content:'';position:absolute;inset:10px;
    border:0.5px solid rgba(139,95,60,0.18);
    border-radius:2px;pointer-events:none;
  }
  .page-inner::after{
    content:'';position:absolute;inset:14px;
    border:0.5px solid rgba(139,95,60,0.1);
    border-radius:1px;pointer-events:none;
  }

  .page-num{
    font-family:'Cormorant Garamond',serif;
    font-size:10px;font-style:italic;color:var(--aged);letter-spacing:3px;
    text-align:center;margin-bottom:8px;opacity:0.55;
  }

  /* Slot centers the photo — image sizes itself to preserve aspect ratio */
  .photo-slot{
    flex:1 1 0;min-height:0;min-width:0;
    position:relative;
    background:transparent;
    display:flex;align-items:center;justify-content:center;
  }
  .photo-slot img{
    display:block;
    max-width:100%;max-height:100%;
    width:auto;height:auto;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.10),
      0 4px 10px rgba(80,50,20,0.22);
    filter:saturate(0.95) contrast(1.02);
  }

  /* Classic triangular photo-corner mounts */
  .tape{
    position:absolute;z-index:2;pointer-events:none;
    width:0;height:0;
    background:transparent;border-radius:0;box-shadow:none;
  }
  .tape-tl{
    top:0;left:0;
    border-top:14px solid rgba(120,85,45,0.55);
    border-right:14px solid transparent;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,0.15));
  }
  .tape-tr{
    top:0;right:0;
    border-top:14px solid rgba(120,85,45,0.55);
    border-left:14px solid transparent;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,0.15));
  }
  .tape-bl{
    bottom:0;left:0;
    border-bottom:14px solid rgba(120,85,45,0.55);
    border-right:14px solid transparent;
    filter:drop-shadow(0 -1px 1px rgba(0,0,0,0.15));
  }
  .tape-br{
    bottom:0;right:0;
    border-bottom:14px solid rgba(120,85,45,0.55);
    border-left:14px solid transparent;
    filter:drop-shadow(0 -1px 1px rgba(0,0,0,0.15));
  }

  .photo-caption{
    margin-top:10px;text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-size:11px;font-style:italic;letter-spacing:2px;color:var(--text-muted);
    opacity:0.7;
  }

  /* ── Back end page ── */
  .back-end{
    height:100%;
    background:linear-gradient(135deg,#4a2a10,#6B4020);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
    border-radius:10px 0 0 10px;
  }
  .back-end-title{
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:18px;color:rgba(201,168,76,0.4);letter-spacing:3px;font-style:italic;
  }
  .back-end-rule{width:50px;height:0.5px;background:rgba(201,168,76,0.25);}
  .back-end-sub{
    font-family:'Special Elite',cursive;
    font-size:9px;letter-spacing:3px;color:rgba(201,168,76,0.25);
  }

  /* ── Dot background ── */
  .dot-bg{
    position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(139,95,60,0.06) 1px,transparent 1px);
    background-size:12px 12px;
    pointer-events:none;border-radius:inherit;z-index:0;
  }

  /* ── RV Road Progress ── */
  .rv-road-wrap{
    width:min(520px,90vw);
    margin:28px auto 0;
    position:relative;
    height:44px;
    display:flex;align-items:center;
  }
  .rv-road-track{
    position:relative;width:100%;height:44px;
    display:flex;align-items:center;cursor:pointer;
  }
  .rv-road-surface{
    position:absolute;left:0;right:0;height:10px;
    top:50%;transform:translateY(-50%);
    background:#3D2B1A;border-radius:5px;
  }
  .rv-road-dash{
    position:absolute;left:0;right:0;height:1.5px;
    top:50%;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,#C4A97A 0px,#C4A97A 8px,transparent 8px,transparent 16px);
    border-radius:2px;
  }
  .rv-road-progress{
    position:absolute;left:0;height:10px;
    top:50%;transform:translateY(-50%);
    background:#9A7B4F;border-radius:5px;
    transition:width .5s cubic-bezier(.4,0,.2,1);
  }
  .rv-road-vehicle{
    position:absolute;top:50%;
    transform:translate(-50%,-62%);
    transition:left .5s cubic-bezier(.4,0,.2,1);
    pointer-events:none;
    filter:drop-shadow(0 1px 3px rgba(43,26,15,0.25));
  }
  .rv-road-vehicle svg{width:52px;height:26px;}

  /* ── Controls ── */
  .controls{
    display:flex;align-items:center;gap:18px;margin-top:28px;
    justify-content:center;
  }
  .nav-btn{
    background:transparent;
    border:1px solid rgba(196,169,122,0.5);
    color:var(--text-muted);
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:14px;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;
    padding:10px 22px;border-radius:4px;cursor:pointer;
    transition:all 0.2s;
  }
  .nav-btn:hover:not(:disabled){
    background:rgba(196,169,122,0.12);
    color:var(--espresso);
    border-color:var(--gold);
  }
  .nav-btn:disabled{opacity:0.25;cursor:default;}
  .page-indicator{
    font-family:'Special Elite',cursive;
    font-size:12px;letter-spacing:2px;color:var(--text-muted);
    min-width:100px;text-align:center;
  }

  /* ── Responsive ── */
  @media(max-width:600px){
    .scene{width:92vw;height:72vw;}
    .cover-title{font-size:20px;letter-spacing:2px;}
    .cover-icon{font-size:26px;}
    .page-inner{padding:10px 12px 8px 16px;}
    .leaf-back .page-inner{padding:10px 16px 8px 12px;}
    .nav-btn{padding:8px 14px;font-size:12px;}
    .content{padding:1.5rem 1rem 2rem;}
  }
</style>
</head>
<body>

<div class="site">

  <nav class="nav">
    <button onclick="window.location.href='index.htm'">Home</button>
    <button onclick="window.location.href='details.htm'">Wedding Details</button>
    <button onclick="window.location.href='party.htm'">Wedding Party</button>
    <button onclick="window.location.href='rsvp.htm'">RSVP</button>
    <button onclick="window.location.href='registry.htm'">Registry</button>
    <button onclick="window.location.href='travel.htm'">Travel</button>
    <button onclick="window.location.href='todo.htm'">Things to Do</button>
    <button onclick="window.location.href='faq.htm'">FAQ</button>
    <button class="active" onclick="window.location.href='travel-photobook.html'">Photo Gallery</button>
  </nav>

  <div class="content">
    <div class="page-header">
      <p>Photo Gallery</p>
      <div class="subtitle">Click to turn pages</div>
    </div>

    <div class="book-wrapper">
      <div class="scene">
        <div class="book-shadow"></div>
        <div class="book">
          <div class="book-cover-bg"></div>
          <div class="book-spine"><span class="spine-title">C &amp; M</span></div>
          <div class="pages-stack"></div>

          <!-- Front cover -->
          <div class="cover-page" id="cover">
            <div class="cover-border"></div>
            <div class="cover-subtitle">Our Travels</div>
            <div class="cover-rule"></div>
            <div class="cover-title">Chelsea <span style="font-style:italic;color:rgba(232,201,122,0.85);">&amp;</span> Matt</div>
            <div class="cover-rule"></div>
            <div class="cover-subtitle">A Photo Journal</div>
            <div class="cover-hint">— click to open —</div>
          </div>

          <!-- Pages are generated by JavaScript -->
          <div class="page-container" id="pageContainer" style="display:none"></div>
        </div>
      </div>

      <div class="controls">
        <button class="nav-btn" id="prevBtn" disabled>&#8592; Back</button>
        <span class="page-indicator" id="pageIndicator">Cover</span>
        <button class="nav-btn" id="nextBtn" disabled>Next &#8594;</button>
      </div>

      <div class="rv-road-wrap">
        <div class="rv-road-track" id="rv-road-track">
          <div class="rv-road-surface"></div>
          <div class="rv-road-progress" id="rv-road-progress"></div>
          <div class="rv-road-dash"></div>
          <div class="rv-road-vehicle" id="rv-road-vehicle">
            <svg viewBox="0 0 52 26" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="5" width="38" height="13" rx="2.5" fill="#F0EBE0" stroke="#C4A97A" stroke-width="0.6"/>
              <rect x="1" y="6.5" width="9" height="11.5" rx="2.5" fill="#E8E0D0" stroke="#C4A97A" stroke-width="0.5"/>
              <rect x="2" y="7.5" width="7" height="6" rx="1" fill="#D9CEB8" opacity="0.9"/>
              <line x1="2.5" y1="8.5" x2="4" y2="13" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
              <rect x="13" y="6" width="5.5" height="5" rx="0.8" fill="#D9CEB8" opacity="0.85"/>
              <rect x="21" y="6" width="5.5" height="5" rx="0.8" fill="#D9CEB8" opacity="0.85"/>
              <rect x="29" y="6" width="5.5" height="5" rx="0.8" fill="#D9CEB8" opacity="0.85"/>

              <rect x="3" y="17" width="33" height="2.5" rx="0.8" fill="#D9CEB8"/>
              <ellipse cx="2.2" cy="14.5" rx="1" ry="1.2" fill="#FFF8E8" stroke="#C4A97A" stroke-width="0.3"/>
              <rect x="38" y="16" width="5" height="1.5" rx="0.6" fill="#C4A97A" opacity="0.5"/>
              <circle cx="8" cy="21" r="3.5" fill="#E8E0D0" stroke="#9A7B4F" stroke-width="0.7"/>
              <circle cx="8" cy="21" r="1.8" fill="#F0EBE0" stroke="#9A7B4F" stroke-width="0.4"/>

              <circle cx="30" cy="21" r="3.5" fill="#E8E0D0" stroke="#9A7B4F" stroke-width="0.7"/>
              <circle cx="30" cy="21" r="1.8" fill="#F0EBE0" stroke="#9A7B4F" stroke-width="0.4"/>

</div>

<script>
(function(){
  var photos = [
    'images/carousel-01.jpg','images/carousel-02.jpg','images/carousel-03.jpg',
    'images/carousel-04.jpg','images/carousel-05.jpg','images/carousel-06.jpg',
    'images/carousel-07.jpg','images/carousel-08.jpg','images/carousel-09.jpg',
    'images/carousel-10.jpg','images/carousel-11.jpg','images/carousel-12.jpg',
    'images/carousel-13.jpg','images/carousel-14.jpg','images/carousel-15.jpg',
    'images/carousel-16.jpg','images/carousel-17.jpg','images/carousel-18.jpg',
    'images/carousel-19.jpg'
  ];

  var totalPhotos = photos.length;
  var totalLeaves = totalPhotos;
  var currentLeaf = 0;
  var bookOpen = false;
  var animating = false;

  var container = document.getElementById('pageContainer');
  var cover = document.getElementById('cover');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var indicator = document.getElementById('pageIndicator');

  var emptyPageHTML = '<div class="dot-bg"></div><div class="page-inner"><div class="page-num"></div><div class="photo-slot" style="border:none;background:transparent;"></div></div>';

  function buildPages(){
    var photoIndex = 0;
    for(var i = 0; i < totalLeaves; i++){
      var leaf = document.createElement('div');
      leaf.className = 'leaf';
      leaf.style.zIndex = totalLeaves - i;
      leaf.setAttribute('data-leaf', i + 1);

      var front = document.createElement('div');
      front.className = 'leaf-front';

      var back = document.createElement('div');
      back.className = 'leaf-back';

      var currentPhotoIndex = photoIndex;
      if(photoIndex < totalPhotos){
        front.innerHTML = buildPhotoPage(photoIndex);
        photoIndex++;
      } else {
        front.innerHTML = emptyPageHTML;
      }

      // Mirror the same photo onto the back of the leaf so flipping pages
      // never reveals an empty parchment side — you always see the photo.
      if(currentPhotoIndex < totalPhotos){
        back.innerHTML = buildPhotoPage(currentPhotoIndex);
      } else {
        back.innerHTML = emptyPageHTML;
      }

      leaf.appendChild(front);
      leaf.appendChild(back);
      container.appendChild(leaf);

      (function(leafEl, leafNum){
        leafEl.addEventListener('click', function(){
          if(animating) return;
          if(leafEl.classList.contains('flipped')){
            goToLeaf(leafNum - 1);
          } else {
            goToLeaf(leafNum);
          }
        });
      })(leaf, i + 1);
    }
  }

  function buildPhotoPage(idx){
    var num = idx + 1;
    return '<div class="dot-bg"></div>' +
      '<div class="page-inner">' +
        '<div class="page-num">~ ' + num + ' of ' + totalPhotos + ' ~</div>' +
        '<div class="photo-slot">' +
          '<img src="' + photos[idx] + '" alt="Photo ' + num + '" loading="lazy">' +
        '</div>' +
        '<div class="photo-caption">our adventures</div>' +
      '</div>';
  }

  function openBook(){
    if(animating) return;
    cover.classList.add('open');
    container.style.display = 'block';
    bookOpen = true;
    currentLeaf = 0;
    updateControls();
  }

  function closeBook(){
    if(animating) return;
    animating = true;
    var leaves = container.querySelectorAll('.leaf');
    for(var i = leaves.length - 1; i >= 0; i--){
      leaves[i].classList.remove('flipped');
    }
    setTimeout(function(){
      cover.classList.remove('open');
      setTimeout(function(){
        container.style.display = 'none';
        bookOpen = false;
        currentLeaf = 0;
        animating = false;
        updateControls();
      }, 2000);
    }, 100);
  }

  function goToLeaf(target){
    if(animating || !bookOpen) return;
    if(target < 0) return closeBook();
    if(target > totalLeaves) return;
    animating = true;
    var leaves = container.querySelectorAll('.leaf');

    for(var i = 0; i < leaves.length; i++){
      var leafNum = i + 1;
      if(leafNum <= target){
        leaves[i].classList.add('flipped');
        leaves[i].style.zIndex = leafNum;
      } else {
        leaves[i].classList.remove('flipped');
        leaves[i].style.zIndex = totalLeaves - i;
      }
    }

    currentLeaf = target;
    setTimeout(function(){
      animating = false;
      updateControls();
    }, 2050);
    updateControls();
  }

  function nextPage(){
    if(!bookOpen){
      openBook();
      return;
    }
    if(currentLeaf < totalLeaves){
      goToLeaf(currentLeaf + 1);
    }
  }

  function prevPage(){
    if(!bookOpen) return;
    if(currentLeaf === 0){
      closeBook();
      return;
    }
    goToLeaf(currentLeaf - 1);
  }

  function updateControls(){
    prevBtn.disabled = !bookOpen;
    nextBtn.disabled = bookOpen && currentLeaf >= totalLeaves;

    if(!bookOpen){
      indicator.textContent = 'Cover';
      prevBtn.disabled = true;
      nextBtn.disabled = false;
    } else if(currentLeaf >= totalLeaves){
      indicator.textContent = 'End';
    } else {
      indicator.textContent = 'Photo ' + (currentLeaf + 1) + ' of ' + totalPhotos;
    }
    updateRoad();
  }

  function updateRoad(){
    var progress = document.getElementById('rv-road-progress');
    var vehicle = document.getElementById('rv-road-vehicle');
    if(!progress || !vehicle) return;
    var pct;
    if(!bookOpen) pct = 0;
    else if(currentLeaf >= totalLeaves) pct = 100;
    else pct = (currentLeaf / (totalLeaves - 1)) * 100;
    progress.style.width = pct + '%';
    vehicle.style.left = Math.max(3, Math.min(97, pct)) + '%';
  }

  function roadClick(e){
    var track = document.getElementById('rv-road-track');
    if(!track) return;
    var rect = track.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    var targetLeaf = Math.round(pct * (totalLeaves - 1));
    targetLeaf = Math.max(0, Math.min(totalLeaves, targetLeaf));
    if(!bookOpen){
      openBook();
      if(targetLeaf > 0) setTimeout(function(){ goToLeaf(targetLeaf); }, 100);
    } else {
      goToLeaf(targetLeaf);
    }
  }

  cover.addEventListener('click', function(){
    if(!bookOpen) openBook();
  });
  prevBtn.addEventListener('click', prevPage);
  nextBtn.addEventListener('click', nextPage);
  var roadTrack = document.getElementById('rv-road-track');
  if(roadTrack) roadTrack.addEventListener('click', roadClick);

  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight' || e.key === ' '){
      e.preventDefault();
      nextPage();
    } else if(e.key === 'ArrowLeft'){
      e.preventDefault();
      prevPage();
    }
  });

  buildPages();
  updateControls();
})();
</script>

</body>
