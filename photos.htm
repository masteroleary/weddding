<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Photo Stamp</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --leather: #8B5E3C; --leather-dark: #5C3D1E; --leather-light: #C4956A;
    --cream: #F5EDD8; --parchment: #EDE0C4; --parchment-dark: #D4C4A0;
    --ink-light: #5C3D20; --gold: #C9A84C; --gold-light: #E8C97A;
    --aged: #B8A88A; --stamp-red: #8B2020; --stamp-blue: #1A3A5C;
  }
  body { min-height:100vh; background:#1a0e04; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Special Elite',cursive; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background: repeating-linear-gradient(88deg,transparent,transparent 38px,rgba(0,0,0,0.05) 38px,rgba(0,0,0,0.05) 39px), linear-gradient(180deg,#221408 0%,#1a0e04 60%,#221408 100%); z-index:0; pointer-events:none; }
  .scene { position:relative; z-index:2; width:280px; height:200px; perspective:1200px; }
  .book-shadow { position:absolute; bottom:-14px; left:8%; right:4%; height:16px; background:radial-gradient(ellipse,rgba(0,0,0,0.55) 0%,transparent 70%); filter:blur(6px); }
  .book { position:relative; width:100%; height:100%; transform-style:preserve-3d; }
  .book-cover-bg { position:absolute; inset:0; border-radius:3px 8px 8px 3px; background:linear-gradient(135deg,var(--leather-dark) 0%,var(--leather) 45%,var(--leather-light) 65%,var(--leather) 100%); box-shadow:-6px 3px 16px rgba(0,0,0,0.65),inset 2px 0 5px rgba(255,255,255,0.07),inset -2px 0 6px rgba(0,0,0,0.25); }
  .book-cover-bg::before { content:''; position:absolute; inset:0; border-radius:inherit; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 3px); }
  .book-cover-bg::after { content:''; position:absolute; inset:7px; border:0.5px solid rgba(201,168,76,0.35); border-radius:1px 5px 5px 1px; pointer-events:none; }
  .book-spine { position:absolute; left:0; top:0; width:18px; height:100%; background:linear-gradient(90deg,var(--leather-dark) 0%,#5a3010 70%,var(--leather-dark) 100%); border-radius:3px 0 0 3px; box-shadow:inset -2px 0 6px rgba(0,0,0,0.4); z-index:5; }
  .book-spine::after { content:'TRAVELS'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg); font-size:7px; letter-spacing:2px; color:rgba(201,168,76,0.5); white-space:nowrap; }
  .pages-stack { position:absolute; left:18px; top:2px; right:2px; bottom:2px; background:linear-gradient(90deg,var(--parchment-dark),var(--cream)); border-radius:0 6px 6px 0; }
  .page-container { position:absolute; left:18px; top:0; right:0; bottom:0; transform-style:preserve-3d; }
  .page { position:absolute; inset:0; transform-style:preserve-3d; transform-origin:left center; transition:transform 0.85s cubic-bezier(0.645,0.045,0.355,1.000); cursor:pointer; }
  .page.flipped { transform:rotateY(-180deg); }
  .page:nth-child(1) { z-index:3; } .page:nth-child(2) { z-index:2; }
  .page.flipped:nth-child(1) { z-index:1; } .page.flipped:nth-child(2) { z-index:3; }
  .page-front,.page-back { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:0 7px 7px 0; overflow:hidden; }
  .page-back { transform:rotateY(180deg); border-radius:7px 0 0 7px; }
  .page-front { background:var(--cream); box-shadow:inset -3px 0 10px rgba(0,0,0,0.1); }
  .page-back { background:var(--parchment); box-shadow:inset 3px 0 10px rgba(0,0,0,0.08); }
  .cover-page { position:absolute; inset:0; background:linear-gradient(135deg,var(--leather-dark) 0%,var(--leather) 50%,var(--leather-light) 100%); border-radius:0 8px 8px 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; z-index:10; transition:transform 0.85s cubic-bezier(0.645,0.045,0.355,1.000); transform-origin:left center; backface-visibility:hidden; }
  .cover-page::before { content:''; position:absolute; inset:0; border-radius:inherit; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 3px); }
  .cover-page.open { transform:rotateY(-180deg); }
  .cover-border { position:absolute; inset:8px; border:0.5px solid rgba(201,168,76,0.45); border-radius:3px; pointer-events:none; }
  .cover-icon { font-size:22px; position:relative; z-index:1; opacity:0.75; line-height:1; }
  .cover-rule { width:55px; height:0.5px; background:linear-gradient(90deg,transparent,var(--gold),transparent); position:relative; z-index:1; }
  .cover-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--gold-light); letter-spacing:2px; text-align:center; line-height:1.15; position:relative; z-index:1; text-shadow:0 1px 6px rgba(0,0,0,0.4); }
  .cover-subtitle { font-size:7px; letter-spacing:3px; color:rgba(201,168,76,0.55); text-transform:uppercase; position:relative; z-index:1; }
  .cover-hint { position:absolute; bottom:12px; font-size:7px; letter-spacing:1.5px; color:rgba(201,168,76,0.38); z-index:1; animation:blink 2.2s infinite; }
  @keyframes blink { 0%,100%{opacity:0.38} 50%{opacity:0.85} }
  .page-inner { padding:10px 12px 8px 14px; height:100%; display:flex; flex-direction:column; position:relative; }
  .page-back .page-inner { padding:10px 14px 8px 12px; }
  .page-inner::before { content:''; position:absolute; inset:5px; border:0.5px solid rgba(139,95,60,0.18); border-radius:3px; pointer-events:none; }
  .page-num { font-size:7px; color:var(--aged); letter-spacing:1.5px; text-align:center; margin-bottom:5px; opacity:0.55; }
  .section-label { font-size:7px; letter-spacing:2.5px; color:var(--ink-light); text-transform:uppercase; text-align:center; margin-bottom:7px; opacity:0.65; display:flex; align-items:center; gap:5px; }
  .section-label::before,.section-label::after { content:''; flex:1; height:0.5px; background:linear-gradient(90deg,transparent,var(--aged),transparent); }
  .photo-slot { flex:1; position:relative; background:rgba(255,255,255,0.45); border:1px dashed rgba(139,95,60,0.3); border-radius:2px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .photo-slot.blank { border:none; background:transparent; }
  .photo-slot img { width:100%; height:100%; object-fit:cover; display:block; }
  .tape { position:absolute; z-index:2; pointer-events:none; width:20px; height:7px; background:rgba(201,168,76,0.3); border-radius:1px; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
  .tape-tl { top:4px; left:4px; transform:rotate(-35deg); }
  .tape-tr { top:4px; right:4px; transform:rotate(35deg); }
  .tape-bl { bottom:4px; left:4px; transform:rotate(35deg); }
  .tape-br { bottom:4px; right:4px; transform:rotate(-35deg); }
  .photo-placeholder { display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0.3; z-index:1; }
  .photo-placeholder svg { width:22px; height:22px; stroke:var(--ink-light); fill:none; stroke-width:1; }
  .photo-placeholder span { font-size:7px; letter-spacing:1px; color:var(--ink-light); text-transform:uppercase; }
  .caption-line { margin-top:5px; height:0.5px; background:linear-gradient(90deg,transparent,var(--aged),transparent); position:relative; }
  .caption-line::after { content:attr(data-caption); position:absolute; top:3px; left:0; right:0; text-align:center; font-size:6.5px; letter-spacing:0.8px; color:var(--aged); opacity:0.7; white-space:nowrap; }
  .map-dot-bg { position:absolute; inset:0; background-image:radial-gradient(circle,rgba(139,95,60,0.07) 1px,transparent 1px); background-size:10px 10px; pointer-events:none; border-radius:inherit; z-index:0; }
  .stamp { position:absolute; border:1.5px solid currentColor; border-radius:1px; padding:2px 5px; font-size:6px; letter-spacing:0.8px; text-transform:uppercase; opacity:0.2; z-index:0; pointer-events:none; }
  .stamp-red { color:var(--stamp-red); } .stamp-blue { color:var(--stamp-blue); }
  .back-end { height:100%; background:linear-gradient(135deg,#4a2a10,#6B4020); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:7px; border-radius:7px 0 0 7px; }
  .back-end-title { font-family:'Playfair Display',serif; font-size:11px; color:rgba(201,168,76,0.45); letter-spacing:2px; font-style:italic; }
  .back-end-rule { width:30px; height:0.5px; background:rgba(201,168,76,0.3); }
  .back-end-sub { font-size:7px; letter-spacing:2px; color:rgba(201,168,76,0.28); }
  .controls { position:relative; z-index:10; display:flex; align-items:center; gap:14px; margin-top:22px; }
  .nav-btn { background:transparent; border:0.5px solid rgba(201,168,76,0.35); color:rgba(201,168,76,0.6); font-family:'Special Elite',cursive; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:7px 14px; border-radius:2px; cursor:pointer; transition:all 0.2s; }
  .nav-btn:hover:not(:disabled) { background:rgba(201,168,76,0.08); color:var(--gold-light); border-color:rgba(201,168,76,0.6); }
  .nav-btn:disabled { opacity:0.18; cursor:default; }
  .page-indicator { font-size:8px; letter-spacing:1.5px; color:rgba(201,168,76,0.38); min-width:70px; text-align:center; }
  .title-label { position:relative; z-index:10; font-size:9px; letter-spacing:4px; color:rgba(201,168,76,0.28); text-transform:uppercase; margin-bottom:16px; }
</style>
</head>
<body>
<div class="title-label">Travel Memories</div>
<div class="scene">
  <div class="book-shadow"></div>
  <div class="book">
    <div class="book-cover-bg"></div>
    <div class="book-spine"></div>
    <div class="pages-stack"></div>
    <div class="cover-page" id="cover" onclick="openBook()">
      <div class="cover-border"></div>
      <div class="cover-icon">✈</div>
      <div class="cover-rule"></div>
      <div class="cover-title">Travel<br>Photos</div>
      <div class="cover-rule"></div>
      <div class="cover-subtitle">A Journey</div>
      <div class="cover-hint">click to open</div>
    </div>
    <div class="page-container" id="pageContainer" style="display:none">
      <div class="page" id="page1" onclick="flipPage(1)">
        <div class="page-front">
          <div class="map-dot-bg"></div>
          <div class="page-inner">
            <div class="page-num">— 1 —</div>
            <div class="section-label">First Stop</div>
            <div class="photo-slot">
              <div class="tape tape-tl"></div><div class="tape tape-tr"></div>
              <div class="tape tape-bl"></div><div class="tape tape-br"></div>
              <div class="photo-placeholder">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Photo 1</span>
              </div>
            </div>
            <div class="caption-line" data-caption="click page to turn →"></div>
          </div>
          <div class="stamp stamp-red" style="top:12px;right:12px;transform:rotate(-8deg)">Departed</div>
        </div>
        <div class="page-back">
          <div class="map-dot-bg"></div>
          <div class="page-inner">
            <div class="page-num"></div>
            <div class="photo-slot blank"></div>
          </div>
        </div>
      </div>
      <div class="page" id="page2" onclick="flipPage(2)">
        <div class="page-front">
          <div class="map-dot-bg"></div>
          <div class="page-inner">
            <div class="page-num">— 2 —</div>
            <div class="section-label">The Moment</div>
            <div class="photo-slot">
              <div class="tape tape-tl"></div><div class="tape tape-tr"></div>
              <div class="tape tape-bl"></div><div class="tape tape-br"></div>
              <div class="photo-placeholder">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Photo 3</span>
              </div>
            </div>
            <div class="caption-line" data-caption="click to close →"></div>
          </div>
          <div class="stamp stamp-red" style="top:12px;right:12px;transform:rotate(5deg)">Explored</div>
        </div>
        <div class="page-back">
          <div class="back-end">
            <div class="back-end-title">The End</div>
            <div class="back-end-rule"></div>
            <div class="back-end-sub">Safe Travels</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="nav-btn" id="prevBtn" onclick="prevPage()" disabled>← Back</button>
  <span class="page-indicator" id="pageIndicator">Cover</span>
  <button class="nav-btn" id="nextBtn" onclick="nextPage()" disabled>Next →</button>
</div>
<script>
  let currentPage=0,totalPages=2,totalPhotos=2,bookOpen=false;
  function openBook(){document.getElementById('cover').classList.add('open');document.getElementById('pageContainer').style.display='block';bookOpen=true;currentPage=0;updateControls();}
  function flipPage(num){const page=document.getElementById('page'+num);if(!page)return;if(!page.classList.contains('flipped')){page.classList.add('flipped');currentPage=num;}else{page.classList.remove('flipped');currentPage=num-1;}updateControls();}
  function nextPage(){if(currentPage<totalPages){const p=document.getElementById('page'+(currentPage+1));if(p&&!p.classList.contains('flipped')){p.classList.add('flipped');currentPage++;}}updateControls();}
  function prevPage(){if(currentPage===0&&bookOpen){for(let i=1;i<=totalPages;i++){const p=document.getElementById('page'+i);if(p)p.classList.remove('flipped');}document.getElementById('cover').classList.remove('open');setTimeout(()=>{document.getElementById('pageContainer').style.display='none';},900);bookOpen=false;currentPage=-1;document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').disabled=true;document.getElementById('pageIndicator').textContent='Cover';return;}if(currentPage>0){const p=document.getElementById('page'+currentPage);if(p&&p.classList.contains('flipped')){p.classList.remove('flipped');currentPage--;}}updateControls();}
  function updateControls(){document.getElementById('prevBtn').disabled=!bookOpen;document.getElementById('nextBtn').disabled=currentPage>=totalPages;const ind=document.getElementById('pageIndicator');if(!bookOpen)ind.textContent='Cover';else if(currentPage>=totalPages)ind.textContent='Last Page';else{const visiblePhoto=Math.min(currentPage+1,totalPhotos);ind.textContent='Photo '+visiblePhoto+' of '+totalPhotos;}}
</script>
</body>
</html>
